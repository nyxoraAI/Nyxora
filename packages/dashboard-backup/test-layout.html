<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; height: 100vh; display: flex; flex-direction: column; }
  .chat-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #eee; }
  .inner { margin: auto auto 0 auto; width: 100%; max-width: 600px; background: #ddd; }
  .msg { padding: 10px; margin: 10px; background: white; border-radius: 8px; }
  .input { height: 60px; background: #ccc; }
</style>
</head>
<body>
  <div class="chat-container">
    <div class="inner">
      <div class="msg">Message 1</div>
      <div class="msg">Message 2</div>
    </div>
  </div>
  <div class="input">Input</div>
</body>
</html>
